<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema Arena — Tela ao vivo</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #1F1410; overflow: hidden;
      font-family: var(--font-body); }
    /* scale the 1920×1080 stage to fit any viewport while preserving aspect */
    .stage-wrap {
      position: fixed; inset: 0;
      display: grid; place-items: center;
    }
    .stage {
      width: 1920px; height: 1080px;
      transform-origin: center center;
      box-shadow: 0 60px 160px rgba(0,0,0,.45);
    }
    @keyframes liveBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="stage-wrap">
    <div class="stage" id="root"></div>
  </div>
  <script>
    // Fit 1920×1080 to the viewport, preserving aspect ratio.
    function fit() {
      const el = document.querySelector('.stage');
      if (!el) return;
      const sx = window.innerWidth  / 1920;
      const sy = window.innerHeight / 1080;
      const s = Math.min(sx, sy);
      el.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    setTimeout(() => { try { fit(); } catch(e){} }, 50);
  </script>
</body>
</html>
