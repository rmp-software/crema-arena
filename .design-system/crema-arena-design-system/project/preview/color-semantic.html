<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic state colors</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--mint-500);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-weight:600;font-size:13px;letter-spacing:.12em">● LIVE</div>
      <div class="swatch-label"><span class="swatch-name">mint-500</span><span>#4F8C72</span></div>
      <div>--live · in progress</div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--marigold-500);display:flex;align-items:center;justify-content:center;color:var(--fg);font-family:var(--font-display);font-weight:700;font-size:14px">WINNER</div>
      <div class="swatch-label"><span class="swatch-name">marigold-500</span><span>#E6A636</span></div>
      <div>--gold · wins</div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--cherry-500);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-weight:600;font-size:13px;letter-spacing:.12em">OUT</div>
      <div class="swatch-label"><span class="swatch-name">cherry-500</span><span>#B83A2E</span></div>
      <div>--danger · eliminated</div>
    </div>
  </div>
</div>
</body></html>
