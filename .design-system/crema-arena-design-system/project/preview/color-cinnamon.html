<!doctype html>
<html><head><meta charset="utf-8"><title>Cinnamon · brand</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(6,1fr);gap:10px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--cinnamon-50)"></div><div class="swatch-label"><span class="swatch-name">50</span><span>#FBEEE5</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--cinnamon-100)"></div><div class="swatch-label"><span class="swatch-name">100</span><span>#F5D5BE</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--cinnamon-300)"></div><div class="swatch-label"><span class="swatch-name">300</span><span>#E1885A</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--cinnamon-500);outline:2px solid var(--fg);outline-offset:2px"></div><div class="swatch-label"><span class="swatch-name">500 · brand</span><span>#C45A2C</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--cinnamon-600)"></div><div class="swatch-label"><span class="swatch-name">600</span><span>#A8471E</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--cinnamon-700)"></div><div class="swatch-label"><span class="swatch-name">700</span><span>#823516</span></div></div>
  </div>
</div>
</body></html>
