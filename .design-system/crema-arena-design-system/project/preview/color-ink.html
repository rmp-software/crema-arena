<!doctype html>
<html><head><meta charset="utf-8"><title>Espresso ink</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(5,1fr);gap:10px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--espresso-900)"></div><div class="swatch-label"><span class="swatch-name" style="color:var(--fg)">espresso-900</span><span>#1F1410</span></div><div>--fg / ink</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--espresso-800)"></div><div class="swatch-label"><span class="swatch-name">espresso-800</span><span>#2C1D17</span></div><div>inverse bg</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--espresso-700)"></div><div class="swatch-label"><span class="swatch-name">espresso-700</span><span>#3E2A22</span></div><div>--fg-2</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--espresso-600)"></div><div class="swatch-label"><span class="swatch-name">espresso-600</span><span>#5A3F33</span></div><div>secondary ink</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--espresso-500)"></div><div class="swatch-label"><span class="swatch-name">espresso-500</span><span>#7A5A4A</span></div><div>--fg-3 / muted</div></div>
  </div>
</div>
</body></html>
