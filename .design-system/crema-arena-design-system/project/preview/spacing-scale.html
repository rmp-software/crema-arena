<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="min-height:200px;gap:14px">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:10px;align-items:end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:4px;height:4px;background:var(--cinnamon-500);border-radius:2px"></div><div class="caption" style="font-size:10px">1·4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:8px;height:8px;background:var(--cinnamon-500);border-radius:2px"></div><div class="caption" style="font-size:10px">2·8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:12px;height:12px;background:var(--cinnamon-500);border-radius:2px"></div><div class="caption" style="font-size:10px">3·12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:16px;background:var(--cinnamon-500);border-radius:2px"></div><div class="caption" style="font-size:10px">4·16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:24px;height:24px;background:var(--cinnamon-500);border-radius:3px"></div><div class="caption" style="font-size:10px">5·24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:32px;height:32px;background:var(--cinnamon-500);border-radius:4px"></div><div class="caption" style="font-size:10px">6·32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:48px;height:48px;background:var(--cinnamon-500);border-radius:6px"></div><div class="caption" style="font-size:10px">7·48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--cinnamon-500);border-radius:8px"></div><div class="caption" style="font-size:10px">8·64</div></div>
  </div>
  <div class="caption">4px base · space-1 → space-8</div>
</div>
</body></html>
