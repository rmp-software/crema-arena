<!doctype html>
<html><head><meta charset="utf-8"><title>Surface tones</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(5,1fr);gap:10px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--crema-50);border:1px solid var(--border)"></div><div class="swatch-label"><span class="swatch-name">crema-50</span><span>#FBF6EA</span></div><div>--bg</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--crema-100)"></div><div class="swatch-label"><span class="swatch-name">crema-100</span><span>#F5ECD8</span></div><div>--bg-2</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--crema-200)"></div><div class="swatch-label"><span class="swatch-name">crema-200</span><span>#EADBC0</span></div><div>--bg-3 / latte</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--crema-300)"></div><div class="swatch-label"><span class="swatch-name">crema-300</span><span>#DCC59E</span></div><div>divider</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--crema-400)"></div><div class="swatch-label"><span class="swatch-name">crema-400</span><span>#C7AB7C</span></div><div>muted on-cream</div></div>
  </div>
</div>
</body></html>
