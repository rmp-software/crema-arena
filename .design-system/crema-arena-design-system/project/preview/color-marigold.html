<!doctype html>
<html><head><meta charset="utf-8"><title>Marigold · gold</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:10px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--marigold-100)"></div><div class="swatch-label"><span class="swatch-name">100</span><span>#FAE7B6</span></div><div>soft gold</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--marigold-300)"></div><div class="swatch-label"><span class="swatch-name">300</span><span>#F0C56C</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--marigold-500);outline:2px solid var(--fg);outline-offset:2px"></div><div class="swatch-label"><span class="swatch-name">500 · gold</span><span>#E6A636</span></div><div>wins · stage</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--marigold-700)"></div><div class="swatch-label"><span class="swatch-name">700</span><span>#B07A1E</span></div></div>
  </div>
</div>
</body></html>
