<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="min-height:180px;align-items:center">
  <div class="row" style="gap:18px;justify-content:space-around;width:100%">
    <div class="stack" style="align-items:center;gap:8px">
      <div style="width:72px;height:56px;background:var(--bg-2);border:1.5px solid var(--border-strong);border-radius:6px"></div>
      <div class="caption">xs · 6 · focus</div>
    </div>
    <div class="stack" style="align-items:center;gap:8px">
      <div style="width:72px;height:56px;background:var(--bg-2);border:1.5px solid var(--border-strong);border-radius:10px"></div>
      <div class="caption">sm · 10 · chip / btn</div>
    </div>
    <div class="stack" style="align-items:center;gap:8px">
      <div style="width:72px;height:56px;background:var(--bg-2);border:1.5px solid var(--border-strong);border-radius:18px"></div>
      <div class="caption">md · 18 · card</div>
    </div>
    <div class="stack" style="align-items:center;gap:8px">
      <div style="width:72px;height:56px;background:var(--bg-2);border:1.5px solid var(--border-strong);border-radius:28px"></div>
      <div class="caption">lg · 28 · sheet</div>
    </div>
    <div class="stack" style="align-items:center;gap:8px">
      <div style="width:72px;height:56px;background:var(--bg-2);border:1.5px solid var(--border-strong);border-radius:999px"></div>
      <div class="caption">full · pill</div>
    </div>
  </div>
</div>
</body></html>
