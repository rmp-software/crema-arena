<!doctype html>
<html><head><meta charset="utf-8"><title>Marks</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="min-height:200px">
  <div class="row" style="justify-content:space-around;gap:24px;flex:1">
    <div class="stack" style="align-items:center;gap:10px">
      <img src="../assets/monogram.svg" style="height:88px;width:88px" />
      <div class="caption">Monogram</div>
    </div>
    <div class="stack" style="align-items:center;gap:10px">
      <img src="../assets/stamp-seal.svg" style="height:96px;width:96px" />
      <div class="caption">Stamp seal · awards / judged</div>
    </div>
    <div class="stack" style="align-items:center;gap:10px">
      <img src="../assets/rings.svg" style="height:88px;width:88px" />
      <div class="caption">Crema rings · motif</div>
    </div>
    <div class="stack" style="align-items:center;gap:10px;background:var(--espresso-900);padding:14px;border-radius:var(--radius-md)">
      <img src="../assets/monogram.svg" style="height:60px;width:60px" />
      <div class="caption" style="color:var(--crema-200)">On espresso</div>
    </div>
  </div>
</div>
</body></html>
