<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="min-height:180px;background:var(--bg-2)">
  <div class="row" style="gap:24px;justify-content:space-around;width:100%;padding:14px 0">
    <div class="stack" style="align-items:center;gap:10px">
      <div style="width:120px;height:72px;background:var(--surface);border-radius:var(--radius-md);box-shadow:var(--shadow-1)"></div>
      <div class="caption">shadow-1 · resting card</div>
    </div>
    <div class="stack" style="align-items:center;gap:10px">
      <div style="width:120px;height:72px;background:var(--surface);border-radius:var(--radius-md);box-shadow:var(--shadow-2)"></div>
      <div class="caption">shadow-2 · floating</div>
    </div>
    <div class="stack" style="align-items:center;gap:10px">
      <div style="width:120px;height:72px;background:var(--cinnamon-500);border-radius:var(--radius-md);box-shadow:var(--shadow-inset),var(--shadow-1)"></div>
      <div class="caption">inset · button hint</div>
    </div>
  </div>
</div>
</body></html>
